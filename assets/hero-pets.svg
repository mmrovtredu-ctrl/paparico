<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 440" width="460" height="440">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#fff3e6"/>
      <stop offset="100%" stop-color="#ffcfa8"/>
    </radialGradient>
  </defs>
  <circle cx="230" cy="215" r="200" fill="url(#bg)"/>
  <circle cx="230" cy="215" r="200" fill="none" stroke="#ee6c4d" stroke-width="4" stroke-dasharray="6 14" opacity=".5"/>

  <!-- Gato (esquerda) -->
  <g transform="translate(120,225)">
    <ellipse cx="0" cy="118" rx="70" ry="16" fill="#e6a877" opacity=".35"/>
    <!-- corpo -->
    <path d="M-45 40 Q-55 120 -30 118 L30 118 Q55 120 45 40 Z" fill="#f6b352"/>
    <!-- cauda -->
    <path d="M42 90 Q90 80 78 30 Q70 55 48 60 Z" fill="#e79a3c"/>
    <!-- cabeça -->
    <circle cx="0" cy="20" r="52" fill="#f6b352"/>
    <!-- orelhas -->
    <path d="M-44 -18 L-52 -60 L-14 -34 Z" fill="#f6b352"/>
    <path d="M44 -18 L52 -60 L14 -34 Z" fill="#f6b352"/>
    <path d="M-40 -24 L-44 -50 L-22 -33 Z" fill="#ee6c4d"/>
    <path d="M40 -24 L44 -50 L22 -33 Z" fill="#ee6c4d"/>
    <!-- olhos -->
    <ellipse cx="-18" cy="14" rx="8" ry="11" fill="#4a352a"/>
    <ellipse cx="18" cy="14" rx="8" ry="11" fill="#4a352a"/>
    <circle cx="-15" cy="10" r="3" fill="#fff"/>
    <circle cx="21" cy="10" r="3" fill="#fff"/>
    <!-- nariz e boca -->
    <path d="M-6 30 L6 30 L0 38 Z" fill="#ee6c4d"/>
    <path d="M0 38 Q-8 46 -16 40 M0 38 Q8 46 16 40" fill="none" stroke="#4a352a" stroke-width="2.5" stroke-linecap="round"/>
    <!-- bigodes -->
    <g stroke="#4a352a" stroke-width="1.8" stroke-linecap="round" opacity=".7">
      <line x1="-20" y1="30" x2="-58" y2="24"/>
      <line x1="-20" y1="35" x2="-56" y2="38"/>
      <line x1="20" y1="30" x2="58" y2="24"/>
      <line x1="20" y1="35" x2="56" y2="38"/>
    </g>
  </g>

  <!-- Cachorro (direita) -->
  <g transform="translate(295,215)">
    <ellipse cx="0" cy="130" rx="80" ry="18" fill="#a9683c" opacity=".35"/>
    <!-- corpo -->
    <path d="M-55 55 Q-70 135 -35 130 L40 130 Q72 135 55 55 Z" fill="#c98a52"/>
    <!-- cabeça -->
    <circle cx="0" cy="25" r="60" fill="#d99a5f"/>
    <!-- orelhas caídas -->
    <path d="M-52 0 Q-92 10 -78 70 Q-58 60 -46 34 Z" fill="#a9683c"/>
    <path d="M52 0 Q92 10 78 70 Q58 60 46 34 Z" fill="#a9683c"/>
    <!-- focinho -->
    <ellipse cx="0" cy="42" rx="34" ry="28" fill="#f0c493"/>
    <!-- olhos -->
    <circle cx="-22" cy="16" r="9" fill="#4a352a"/>
    <circle cx="22" cy="16" r="9" fill="#4a352a"/>
    <circle cx="-19" cy="12" r="3.2" fill="#fff"/>
    <circle cx="25" cy="12" r="3.2" fill="#fff"/>
    <!-- nariz -->
    <ellipse cx="0" cy="36" rx="11" ry="8" fill="#4a352a"/>
    <ellipse cx="-3" cy="33" rx="3" ry="2" fill="#7a6455"/>
    <!-- boca -->
    <path d="M0 44 L0 54 M0 54 Q-14 62 -24 52 M0 54 Q14 62 24 52" fill="none" stroke="#4a352a" stroke-width="3" stroke-linecap="round"/>
    <!-- língua -->
    <path d="M-7 56 Q0 74 7 56 Z" fill="#ee6c4d"/>
  </g>

  <!-- coração -->
  <path d="M230 70 q-14 -20 -30 -6 q-14 12 30 44 q44 -32 30 -44 q-16 -14 -30 6 Z" fill="#ee6c4d" opacity=".9"/>
</svg>
